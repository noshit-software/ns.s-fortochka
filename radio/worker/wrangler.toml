name = "fortochka-radio-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[triggers]
crons = ["*/5 * * * *"]

[[kv_namespaces]]
binding = "STATUS_KV"
id = "b341ef65ca64456da9df7cb1400e3562"

# -----------------------------------------------------------------------
# Secrets — set via: npx wrangler secret put <NAME>
# -----------------------------------------------------------------------
#
# PIN              — Optional PIN for /api/connect (leave unset = no PIN)
#
# SNI Auto-Rotation (required for automatic failover):
#   PANEL_URL      — 3x-ui panel base URL, e.g. http://163.192.34.235:2053/mHdFe3WjFxXacirHi0
#   PANEL_USER     — Panel username (change from admin!)
#   PANEL_PASS     — Panel password (change from admin!)
#
# To set them all:
#   npx wrangler secret put PANEL_URL
#   npx wrangler secret put PANEL_USER
#   npx wrangler secret put PANEL_PASS
#   npx wrangler secret put SCAN_SECRET   — shared secret for /api/scan-results
# -----------------------------------------------------------------------
