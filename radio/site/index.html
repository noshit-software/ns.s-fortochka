<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Форточка</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="radio">
    <!-- Wood cabinet top curve -->
    <div class="cabinet-top"></div>

    <!-- Speaker grill with fabric texture -->
    <div class="speaker-section">
      <div class="speaker-grill">
        <div class="grill-badge">
          <div class="power-led" id="power-led"></div>
        </div>
      </div>
    </div>

    <!-- Frequency band display -->
    <div class="freq-band">
      <div class="freq-label">ФОРТОЧКА</div>
      <div class="freq-status" id="status-text">Scanning...</div>
    </div>

    <!-- Control panel with preset buttons -->
    <div class="control-panel">
      <!-- Left knob (decorative) -->
      <div class="knob knob-left">
        <div class="knob-inner"></div>
        <div class="knob-indicator"></div>
      </div>

      <!-- Preset buttons -->
      <div class="presets" id="presets">
        <!-- Injected by app.js -->
      </div>

      <!-- Right knob (decorative) -->
      <div class="knob knob-right">
        <div class="knob-inner"></div>
        <div class="knob-indicator"></div>
      </div>
    </div>

    <!-- Output display -->
    <div class="output-panel" id="output">
      <div class="output-idle">Select a station</div>
    </div>

    <!-- Bottom trim -->
    <div class="cabinet-bottom">
      <span class="brand">noshit.software</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
